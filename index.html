<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Assignment - Internship Project</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>

<div id="tophead">
<div id="first"> 
    <div class="left"></div>
    <div class="right">
         <main class="page">
    <header class="topbar">
      <!-- <h1 class="logo">My Portfolio</h1> -->
    </header>

    <section class="content-wrap">
      <!-- Left column - widget 1 (tabs) -->
      <aside class="widget widget-left" id="widget-1">
        <div class="card">
          <div class="tabs" role="tablist" aria-label="Profile tabs">
            <button role="tab" aria-selected="true" id="tab-about" class="tab">About Me</button>
            <button role="tab" aria-selected="false" id="tab-exp" class="tab">Experience</button>
            <button role="tab" aria-selected="false" id="tab-rec" class="tab">Recommended</button>
          </div>
          <div class="tab-panels">
            <div role="tabpanel" id="panel-about" aria-labelledby="tab-about" class="panel"> 
             
              <p>I am a frontend developer who converts designs into pixel-perfect websites. I focus on accessibility and responsive layouts.</p>
            </div>
            <div role="tabpanel" id="panel-exp" aria-labelledby="tab-exp" class="panel" hidden>
              <!-- <h2>Experience</h2> -->
              <ul>
                <li>Internship at XYZ — Frontend</li>
                <li>Freelance UI implementations</li>
              </ul>
            </div>
            <div role="tabpanel" id="panel-rec" aria-labelledby="tab-rec" class="panel" hidden>
              <!-- <h2>Recommended</h2> -->
              <p>These are recommended resources and projects I worked on.</p>
            </div>
          </div>
        </div>
      </aside>
      <div class="middle"></div>

      <!-- Right column - widget 2 (gallery) -->
      <aside class="widget widget-right" id="widget-2">
        

        <div class="gallery-box">

  <div class="galleryboxx" ><h6 class="gallery-title">Gallery</h6></div>
  
  <div class="gallery-content">
    <button id="left-btn" class="arrow-btn">←</button>

    <div class="card-gallery" id="cardGallery">
      <!-- Images will appear here -->
    </div>

    <button id="right-btn" class="arrow-btn">→</button>
  </div>

  <button id="addImageBtn" class="add-image-btn"><span>+ ADD IMAGE</span></button>
  <input type="file" id="imgInput" accept="image/*" multiple hidden>
</div>
      </aside>
      <div class="middle"></div>

    </section>

  </main>
    </div></div>
 

  <script src="script.js"></script>
   </div>
</body>
</html>
